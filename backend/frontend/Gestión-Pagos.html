<!doctype html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Gestión de Pagos - Constructora Malambo</title>

		<style>
			body {
				font-family: Arial, sans-serif;
				background: #f4f6f9;
				padding: 20px;
			}
			.container {
				max-width: 1100px;
				margin: auto;
				background: white;
				padding: 20px;
				border-radius: 10px;
				box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
			}
			h1 {
				text-align: center;
				color: #2c3e50;
			}
			form {
				display: grid;
				grid-template-columns: repeat(3, 1fr);
				gap: 10px;
				margin-bottom: 20px;
			}
			input,
			select,
			button {
				padding: 8px;
				border-radius: 5px;
				border: 1px solid #ccc;
			}
			button {
				background: #27ae60;
				color: white;
				cursor: pointer;
			}
			button:hover {
				background: #219150;
			}
			table {
				width: 100%;
				border-collapse: collapse;
			}
			th,
			td {
				padding: 8px;
				border-bottom: 1px solid #ddd;
				text-align: center;
			}
			th {
				background: #2c3e50;
				color: white;
			}
			.historial {
				background: #ecf0f1;
				padding: 10px;
				margin-top: 10px;
			}
		</style>
	</head>

	<body>
		<div class="container">
			<h1>💰 Gestión de Pagos - Constructora Malambo</h1>

			<h3>Registrar Cliente y Compra</h3>
			<form id="compraForm">
				<input type="text" id="cliente" placeholder="Nombre del cliente" required />
				<input type="email" id="correo" placeholder="Correo electrónico" required />
				<input type="number" id="total" placeholder="Total de la compra" required />
				<button type="submit">Registrar Compra</button>
			</form>

			<h3>Registrar Pago</h3>
			<form id="pagoForm">
				<select id="selectCliente"></select>
				<input type="number" id="montoPago" placeholder="Monto a pagar" required />
				<button type="submit">Registrar Pago</button>
			</form>

			<h3>Lista de Clientes</h3>
			<table>
				<thead>
					<tr>
						<th>Cliente</th>
						<th>Total</th>
						<th>Saldo</th>
						<th>Acciones</th>
					</tr>
				</thead>
				<tbody id="tablaClientes"></tbody>
			</table>

			<div id="historialPagos"></div>
		</div>

		<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

		<script>
			let clientes = JSON.parse(localStorage.getItem("clientes")) || [];

			const compraForm = document.getElementById("compraForm");
			const pagoForm = document.getElementById("pagoForm");
			const tablaClientes = document.getElementById("tablaClientes");
			const selectCliente = document.getElementById("selectCliente");
			const historialDiv = document.getElementById("historialPagos");

			function guardarLocal() {
				localStorage.setItem("clientes", JSON.stringify(clientes));
			}

			function renderizar() {
				tablaClientes.innerHTML = "";
				selectCliente.innerHTML = "";

				clientes.forEach((c, index) => {
					tablaClientes.innerHTML += `
        <tr>
            <td>${c.nombre}</td>
            <td>$${c.total.toLocaleString()}</td>
            <td>$${c.saldo.toLocaleString()}</td>
            <td>
                <button onclick="verHistorial(${index})">Historial</button>
            </td>
        </tr>
        `;

					selectCliente.innerHTML += `<option value="${index}">${c.nombre}</option>`;
				});
			}

			compraForm.addEventListener("submit", (e) => {
				e.preventDefault();

				const nuevoCliente = {
					nombre: cliente.value,
					correo: correo.value,
					total: parseInt(total.value),
					saldo: parseInt(total.value),
					pagos: [],
				};

				clientes.push(nuevoCliente);
				guardarLocal();
				renderizar();
				compraForm.reset();
			});

			pagoForm.addEventListener("submit", (e) => {
				e.preventDefault();

				const index = selectCliente.value;
				const monto = parseInt(montoPago.value);

				clientes[index].saldo -= monto;

				clientes[index].pagos.push({
					fecha: new Date().toLocaleDateString(),
					monto: monto,
				});

				generarPDF(clientes[index], monto);

				guardarLocal();
				renderizar();
				pagoForm.reset();
			});

			function verHistorial(index) {
				const cliente = clientes[index];

				let html = `<div class="historial">
    <h4>Historial de ${cliente.nombre}</h4>`;

				cliente.pagos.forEach((p) => {
					html += `<p>${p.fecha} - $${p.monto.toLocaleString()}</p>`;
				});

				html += `</div>`;

				historialDiv.innerHTML = html;
			}

			function generarPDF(cliente, monto) {
				const { jsPDF } = window.jspdf;
				const doc = new jsPDF();

				doc.text("Constructora Malambo", 20, 20);
				doc.text("Comprobante de Pago", 20, 30);
				doc.text("Cliente: " + cliente.nombre, 20, 40);
				doc.text("Pago: $" + monto.toLocaleString(), 20, 50);
				doc.text("Saldo restante: $" + cliente.saldo.toLocaleString(), 20, 60);
				doc.text("Fecha: " + new Date().toLocaleDateString(), 20, 70);

				doc.save("Comprobante_" + cliente.nombre + ".pdf");
			}

			renderizar();
		</script>
	</body>
</html>
